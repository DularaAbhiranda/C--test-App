trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  projectPath: 'aspnetcore-realworld-example-app/src/Conduit/Conduit.csproj'
  publishOutput: '$(Build.ArtifactStagingDirectory)/publish'
  zipFile: '$(Build.ArtifactStagingDirectory)/veracode-artifact.zip'

stages:
  - stage: Build
    displayName: 'Build'
    jobs:
      - job: BuildJob
        displayName: 'Build and Publish'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 10 SDK'
            inputs:
              packageType: 'sdk'
              version: '10.0.x'

          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet packages'
            inputs:
              command: 'restore'
              projects: '$(projectPath)'

          - task: DotNetCoreCLI@2
            displayName: 'Build'
            inputs:
              command: 'build'
              projects: '$(projectPath)'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Publish'
            inputs:
              command: 'publish'
              projects: '$(projectPath)'
              arguments: '--configuration $(buildConfiguration) --no-restore --output $(publishOutput)'
              zipAfterPublish: false

          - task: ArchiveFiles@2
            displayName: 'Zip published output for Veracode'
            inputs:
              rootFolderOrFile: '$(publishOutput)'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(zipFile)'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish artifact'
            inputs:
              PathtoPublish: '$(zipFile)'
              ArtifactName: 'veracode-artifact'

  - stage: VeracodeScan
    displayName: 'Veracode Pipeline Scan'
    dependsOn: Build
    jobs:
      - job: ScanJob
        displayName: 'Run Veracode Pipeline Scan'
        steps:
          - task: DownloadBuildArtifacts@1
            displayName: 'Download build artifact'
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'veracode-artifact'
              downloadPath: '$(System.ArtifactsDirectory)'

          - task: JavaToolInstaller@0
            displayName: 'Install Java 11'
            inputs:
              versionSpec: '11'
              jdkArchitectureOption: 'x64'
              jdkSourceOption: 'PreInstalled'

          - script: |
              curl -sSO https://downloads.veracode.com/securityscan/pipeline-scan-LATEST.zip
              unzip -o pipeline-scan-LATEST.zip pipeline-scan.jar
            displayName: 'Download Veracode Pipeline Scanner'

          - script: |
              java -jar pipeline-scan.jar \
                --veracode_api_id "$(VERACODE_API_ID)" \
                --veracode_api_key "$(VERACODE_API_KEY)" \
                --file "$(System.ArtifactsDirectory)/veracode-artifact/veracode-artifact.zip" \
                --fail_on_severity "Very High, High"
            displayName: 'Run Veracode Pipeline Scan'
