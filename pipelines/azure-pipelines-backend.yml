# ─────────────────────────────────────────────────────────
# Conduit — Backend Pipeline (ASP.NET Core)
# Triggers ONLY when files inside conduit-backend/ change
#
# Required pipeline variables (mark as secret):
#   VERACODE_API_ID   — Veracode API ID
#   VERACODE_API_KEY  — Veracode API Key
#
# Required marketplace extension:
#   Veracode Application Security Platform
#   https://marketplace.visualstudio.com/items?itemName=Veracode.veracode-vsts-build-extension
# ─────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - conduit-backend/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - conduit-backend/**

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '10.0.x'
  project: 'conduit-backend/src/Conduit/Conduit.csproj'
  testProject: 'conduit-backend/tests/Conduit.IntegrationTests'
  artifactDir: '$(Build.ArtifactStagingDirectory)'

# ─────────────────────────────────────────────
# STAGE 1 — Build & Test
# ─────────────────────────────────────────────
stages:
  - stage: Build
    displayName: 'Build & Test Backend'
    jobs:
      - job: BuildAndTest
        displayName: 'Restore → Build → Test → Publish'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET SDK $(dotnetVersion)'
            inputs:
              packageType: sdk
              version: $(dotnetVersion)

          - script: dotnet restore $(project)
            displayName: 'Restore NuGet packages'

          - script: |
              dotnet build $(project) \
                --configuration $(buildConfiguration) \
                --no-restore
            displayName: 'Build'

          - script: |
              dotnet test $(testProject) \
                --configuration $(buildConfiguration) \
                --logger trx \
                --results-directory $(artifactDir)/test-results
            displayName: 'Run integration tests'

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '$(artifactDir)/test-results/*.trx'
            condition: always()

          - script: |
              dotnet publish $(project) \
                --configuration $(buildConfiguration) \
                --no-restore \
                --no-self-contained \
                --output $(artifactDir)/publish
            displayName: 'Publish backend'

          - task: ArchiveFiles@2
            displayName: 'Zip for Veracode'
            inputs:
              rootFolderOrFile: '$(artifactDir)/publish'
              includeRootFolder: false
              archiveType: zip
              archiveFile: '$(artifactDir)/veracode-backend.zip'

          - task: PublishBuildArtifacts@1
            displayName: 'Upload build artifact'
            inputs:
              PathtoPublish: '$(artifactDir)/veracode-backend.zip'
              ArtifactName: 'backend-artifact'

# ─────────────────────────────────────────────
# STAGE 2 — Veracode Security Scan
# ─────────────────────────────────────────────
  - stage: SecurityScan
    displayName: 'Veracode — Full SAST Scan'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: VeracodeScan
        displayName: 'Upload & Scan (Full SAST)'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: DownloadBuildArtifacts@1
            displayName: 'Download backend artifact'
            inputs:
              artifactName: 'backend-artifact'
              downloadPath: '$(artifactDir)'

          - task: Veracode@3
            displayName: 'Veracode Upload and Scan'
            inputs:
              ConnectionDetailsSelection: 'Credentials'
              apiId: '$(VERACODE_API_ID)'
              apiKey: '$(VERACODE_API_KEY)'
              veracodeAppProfile: 'Conduit-Backend'
              version: '$(Build.BuildNumber)'
              filepath: '$(artifactDir)/backend-artifact/veracode-backend.zip'
              createSandBox: false
              importResults: true
              failBuildOnPolicyFail: true
              maximumWaitTime: '60'
